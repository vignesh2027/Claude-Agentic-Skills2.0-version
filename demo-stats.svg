<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d0602"/>
      <stop offset="50%" style="stop-color:#1a0e05"/>
      <stop offset="100%" style="stop-color:#0d0602"/>
    </linearGradient>
    <linearGradient id="gbar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#fbbf24;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#fbbf24;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="numgrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fcd34d"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>

  <rect width="900" height="200" fill="url(#bg4)"/>
  <pattern id="dp2" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="0.7" fill="#fbbf24" opacity="0.06"/>
  </pattern>
  <rect width="900" height="200" fill="url(#dp2)"/>

  <!-- Top line -->
  <rect x="0" y="0" width="900" height="2" fill="url(#gbar)"/>

  <!-- Stat 1 -->
  <text x="112" y="90" text-anchor="middle" fill="url(#numgrad)" font-size="52" font-family="'Courier New',monospace" font-weight="bold" filter="url(#glow4)" opacity="0">
    135+
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.1;0.2;1" dur="3s" fill="freeze"/>
  </text>
  <text x="112" y="114" text-anchor="middle" fill="#78350f" font-size="11" font-family="monospace" letter-spacing="3" opacity="0">
    SKILLS
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.15;0.25;1" dur="3s" fill="freeze"/>
  </text>

  <!-- Divider -->
  <rect x="224" y="50" width="1" height="100" fill="#3d2600" opacity="0.8"/>

  <!-- Stat 2 -->
  <text x="337" y="90" text-anchor="middle" fill="url(#numgrad)" font-size="52" font-family="'Courier New',monospace" font-weight="bold" filter="url(#glow4)" opacity="0">
    4
    <animate attributeName="opacity" values="0;0;0;1;1" keyTimes="0;0.2;0.3;0.4;1" dur="3s" fill="freeze"/>
  </text>
  <text x="337" y="114" text-anchor="middle" fill="#78350f" font-size="11" font-family="monospace" letter-spacing="3" opacity="0">
    APEX LEGENDS
    <animate attributeName="opacity" values="0;0;0;1;1" keyTimes="0;0.25;0.35;0.45;1" dur="3s" fill="freeze"/>
  </text>

  <!-- Divider -->
  <rect x="449" y="50" width="1" height="100" fill="#3d2600" opacity="0.8"/>

  <!-- Stat 3 -->
  <text x="562" y="90" text-anchor="middle" fill="url(#numgrad)" font-size="52" font-family="'Courier New',monospace" font-weight="bold" filter="url(#glow4)" opacity="0">
    12
    <animate attributeName="opacity" values="0;0;0;0;1;1" keyTimes="0;0.3;0.4;0.5;0.6;1" dur="3s" fill="freeze"/>
  </text>
  <text x="562" y="114" text-anchor="middle" fill="#78350f" font-size="11" font-family="monospace" letter-spacing="3" opacity="0">
    DOMAINS
    <animate attributeName="opacity" values="0;0;0;0;1;1" keyTimes="0;0.35;0.45;0.55;0.65;1" dur="3s" fill="freeze"/>
  </text>

  <!-- Divider -->
  <rect x="674" y="50" width="1" height="100" fill="#3d2600" opacity="0.8"/>

  <!-- Stat 4 -->
  <text x="787" y="90" text-anchor="middle" fill="url(#numgrad)" font-size="52" font-family="'Courier New',monospace" font-weight="bold" filter="url(#glow4)" opacity="0">
    MIT
    <animate attributeName="opacity" values="0;0;0;0;0;1;1" keyTimes="0;0.4;0.5;0.6;0.7;0.8;1" dur="3s" fill="freeze"/>
  </text>
  <text x="787" y="114" text-anchor="middle" fill="#78350f" font-size="11" font-family="monospace" letter-spacing="3" opacity="0">
    FREE FOREVER
    <animate attributeName="opacity" values="0;0;0;0;0;1;1" keyTimes="0;0.45;0.55;0.65;0.75;0.85;1" dur="3s" fill="freeze"/>
  </text>

  <!-- Bottom description -->
  <text x="450" y="162" text-anchor="middle" fill="#4d2c00" font-size="11" font-family="monospace" letter-spacing="2" opacity="0">
    AgentOS 2.0  ·  135+ Skills  ·  The Most Complete Claude Skills Repository
    <animate attributeName="opacity" values="0;0;0;0;0;0;1" keyTimes="0;0.6;0.7;0.75;0.8;0.85;0.9" dur="3s" fill="freeze"/>
  </text>

  <!-- Bottom line -->
  <rect x="0" y="198" width="900" height="2" fill="url(#gbar)"/>
</svg>
